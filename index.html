
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --void:#0A0A0F;
  --deep:#11111A;
  --surface:#1A1A28;
  --border:#2A2A3A;
  --green:#1D9E75;
  --wave:#5DCAA5;
  --mist:#9FE1CB;
  --foam:#F0FBF7;
  --text:#F0FBF7;
  --muted:#6B7280;
  --dimmed:#3A3A50;
}
body{background:var(--void);font-family:'Inter',system-ui,sans-serif;color:var(--text);min-height:100vh}
.app{max-width:600px;margin:0 auto;padding:2rem 1.25rem 4rem}

.header{display:flex;align-items:center;gap:12px;margin-bottom:2.5rem}
.logo-icon{width:40px;height:40px;border-radius:9px;background:var(--deep);border:0.5px solid var(--border);display:flex;align-items:center;justify-content:flex-end;padding:6px 5px;gap:2px;flex-shrink:0;position:relative}
.bar{border-radius:2px;background:var(--wave);width:3px}
.bar-1{height:12px}
.bar-2{height:20px}
.bar-3{height:16px}
.bar-4{height:24px}
.bar-5{height:18px}
.bar-6{height:28px;background:var(--green)}
.bar-7{height:20px}
.dot-mark{position:absolute;bottom:5px;right:5px;width:4px;height:4px;border-radius:50%;background:var(--green)}
.wordmark{font-size:22px;font-weight:900;letter-spacing:-0.04em;color:var(--foam)}
.wordmark span{color:var(--wave)}
.tagline{font-size:11px;letter-spacing:0.14em;color:var(--muted);text-transform:uppercase;margin-top:1px}

.drop-zone{border:1px dashed var(--dimmed);border-radius:16px;padding:2.5rem 1.5rem;text-align:center;cursor:pointer;transition:border-color 0.2s,background 0.2s;background:var(--deep);position:relative;margin-bottom:1rem}
.drop-zone.drag{border-color:var(--wave);background:var(--surface)}
.drop-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.drop-icon{width:52px;height:52px;margin:0 auto 1rem;border-radius:50%;background:var(--surface);border:0.5px solid var(--border);display:flex;align-items:center;justify-content:flex-end;padding:10px 8px;gap:2px}
.drop-icon .bar{background:var(--dimmed)}
.drop-icon .bar-6{background:var(--dimmed)}
.drop-label{font-size:15px;font-weight:700;color:var(--foam);margin-bottom:4px}
.drop-sub{font-size:12px;color:var(--muted)}

.file-pill{display:flex;align-items:center;gap:10px;background:var(--surface);border:0.5px solid var(--border);border-radius:10px;padding:0.7rem 1rem;display:none}
.file-pill-icon{width:32px;height:32px;border-radius:7px;background:var(--deep);border:0.5px solid var(--border);display:flex;align-items:flex-end;justify-content:flex-end;padding:4px 3px;gap:1.5px;flex-shrink:0}
.file-pill-icon .bar{background:var(--wave);width:2.5px}
.file-pill-icon .bar-6{background:var(--green)}
.fname{font-size:13px;font-weight:600;color:var(--foam);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fsize{font-size:11px;color:var(--muted)}
.clear-btn{font-size:12px;color:var(--dimmed);cursor:pointer;padding:4px;border-radius:4px;background:none;border:none;color:var(--muted);transition:color 0.15s}
.clear-btn:hover{color:var(--wave)}

.section-label{font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);margin-bottom:0.6rem;font-weight:500}

.stem-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1.25rem}
.stem-btn{border:0.5px solid var(--border);border-radius:10px;padding:0.75rem 1rem;background:var(--deep);cursor:pointer;display:flex;align-items:center;gap:10px;font-family:'Inter',system-ui,sans-serif;font-size:13px;font-weight:600;color:var(--muted);transition:all 0.15s;text-align:left}
.stem-btn.on{border-color:var(--green);color:var(--wave)}
.stem-icon{width:28px;height:28px;border-radius:6px;background:var(--surface);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background 0.15s}
.stem-btn.on .stem-icon{background:#0F3D2E}
.stem-pip{width:8px;height:8px;border-radius:50%;background:var(--dimmed);transition:background 0.15s}
.stem-btn.on .stem-pip{background:var(--wave)}

.process-btn{width:100%;padding:1rem;border-radius:12px;border:none;background:var(--green);color:var(--void);font-family:'Inter',system-ui,sans-serif;font-size:15px;font-weight:800;cursor:pointer;transition:background 0.15s,transform 0.1s;display:flex;align-items:center;justify-content:center;gap:8px;letter-spacing:-0.01em}
.process-btn:hover:not(:disabled){background:var(--wave)}
.process-btn:active:not(:disabled){transform:scale(0.98)}
.process-btn:disabled{background:var(--dimmed);color:var(--muted);cursor:not-allowed}

.prog-wrap{margin-top:1rem;display:none}
.prog-track{height:3px;background:var(--surface);border-radius:2px;overflow:hidden;margin-bottom:6px}
.prog-fill{height:100%;background:var(--green);width:0%;transition:width 0.3s;border-radius:2px}
.prog-label{font-size:11px;color:var(--muted);font-family:'Inter',monospace;text-align:center;letter-spacing:0.04em}

.results{display:none;margin-top:1.5rem}
.result-card{background:var(--deep);border:0.5px solid var(--border);border-radius:14px;padding:1rem 1.125rem;margin-bottom:8px;transition:border-color 0.2s}
.result-card:hover{border-color:var(--dimmed)}
.rcard-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.rcard-title{font-size:13px;font-weight:700;color:var(--foam);display:flex;align-items:center;gap:8px}
.stem-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.rbadge{font-size:10px;font-family:'Inter',monospace;background:var(--surface);color:var(--muted);padding:2px 8px;border-radius:5px;border:0.5px solid var(--border)}
.wave-canvas{width:100%;height:52px;border-radius:8px;background:var(--surface);display:block;margin-bottom:10px}
.rcard-controls{display:flex;align-items:center;gap:8px}
.play-btn{width:32px;height:32px;border-radius:50%;border:0.5px solid var(--border);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background 0.15s,border-color 0.15s}
.play-btn:hover{background:var(--dimmed);border-color:var(--wave)}
.play-btn svg{fill:var(--wave)}
.time-disp{font-size:11px;font-family:'Inter',monospace;color:var(--muted);min-width:32px}
.vol-slider{flex:1;accent-color:var(--green)}
.dl-btn{border:0.5px solid var(--green);border-radius:8px;padding:5px 12px;background:transparent;color:var(--wave);font-family:'Inter',system-ui,sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:background 0.15s;white-space:nowrap}
.dl-btn:hover{background:#0F3D2E}

.notice{font-size:11px;color:var(--dimmed);font-family:'Inter',monospace;background:var(--deep);border-radius:10px;padding:0.7rem 0.9rem;margin-top:1.5rem;line-height:1.7;border:0.5px solid var(--border)}
.notice span{color:var(--muted)}

.controls-wrap{display:none;margin-top:1rem}
</style>

<div class="app">
  <div class="header">
    <div class="logo-icon">
      <div class="bar bar-1"></div>
      <div class="bar bar-2"></div>
      <div class="bar bar-3"></div>
      <div class="bar bar-4"></div>
      <div class="bar bar-5"></div>
      <div class="bar bar-6"></div>
      <div class="bar bar-7"></div>
      <div class="dot-mark"></div>
    </div>
    <div>
      <div class="wordmark">son<span>iq</span></div>
      <div class="tagline">by DeskLabs</div>
    </div>
  </div>

  <div class="drop-zone" id="dz">
    <input type="file" id="fi" accept="audio/*"/>
    <div class="drop-icon">
      <div class="bar bar-1"></div>
      <div class="bar bar-2"></div>
      <div class="bar bar-3"></div>
      <div class="bar bar-4"></div>
      <div class="bar bar-5"></div>
      <div class="bar bar-6"></div>
      <div class="bar bar-7"></div>
    </div>
    <div class="drop-label">Drop your track here</div>
    <div class="drop-sub">MP3 · WAV · FLAC · M4A</div>
  </div>

      <div class="bar bar-1" style="height:8px"></div>
      <div class="bar bar-2" style="height:14px"></div>
      <div class="bar bar-3" style="height:10px"></div>
      <div class="bar bar-6" style="height:18px;width:2.5px"></div>
      <div class="bar bar-7" style="height:12px"></div>
    </div>

      <div class="fname" id="fname">—</div>

  </div>

  <div class="controls-wrap" id="cw">
    <div class="section-label" style="margin-top:1.25rem">Output stems</div>
    <div class="stem-grid">
      <button class="stem-btn on" data-stem="instrumental">
        <div class="stem-icon">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#5DCAA5" stroke-width="2.5" stroke-linecap="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
        </div>
        <span>Instrumental</span>
      </button>
      <button class="stem-btn on" data-stem="vocals">
        <div class="stem-icon">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#5DCAA5" stroke-width="2.5" stroke-linecap="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
        </div>

        </div>
        <span>Bass</span>
      </button>
      <button class="stem-btn" data-stem="drums">
        <div class="stem-icon">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#3A3A50" stroke-width="2.5" stroke-linecap="round"><ellipse cx="12" cy="6" rx="9" ry="4"/><path d="M3 6v12c0 2.2 4 4 9 4s9-1.8 9-4V6"/><path d="M21 12c0 2.2-4 4-9 4s-9-1.8-9-4"/></svg>
        </div>
        <span>Drums</span>
      </button>
    </div>

    <button class="process-btn" id="procBtn" disabled>
      <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      Process Track
    </button>

    <div class="prog-wrap" id="pw">
      <div class="prog-track"><div class="prog-fill" id="pf"></div></div>
      <div class="prog-label" id="pl">Decoding…</div>
    </div>
  </div>

  <div class="results" id="results">
    <div class="section-label" style="margin-top:1.5rem;margin-bottom:0.75rem">Stems ready</div>
  </div>

  <div class="notice"><span>100% in-browser</span> · no uploads · no servers<br>Phase cancellation + biquad filtering · AI-grade Demucs needs a backend</div>
</div>

<script>
const stemColors={instrumental:'#1D9E75',vocals:'#5DCAA5',bass:'#9FE1CB',drums:'#EF9F27'};
const stemNames={instrumental:'Instrumental',vocals:'Vocals',bass:'Bass',drums:'Drums'};

const dz=document.getElementById('dz');
const fi=document.getElementById('fi');
const fp=document.getElementById('fp');
const fname=document.getElementById('fname');
const fsize=document.getElementById('fsize');
const clearBtn=document.getElementById('clearBtn');
const cw=document.getElementById('cw');
const procBtn=document.getElementById('procBtn');
const pw=document.getElementById('pw');
const pf=document.getElementById('pf');
const pl=document.getElementById('pl');
const results=document.getElementById('results');

let audioBuf=null,audioCtx=null,curFile=null,stemBufs={},stemSrcs={},stemPlaying={};

dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag')});
dz.addEventListener('dragleave',()=>dz.classList.remove('drag'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag');if(e.dataTransfer.files[0])loadFile(e.dataTransfer.files[0])});
fi.addEventListener('change',()=>{if(fi.files[0])loadFile(fi.files[0])});
clearBtn.addEventListener('click',resetAll);

async function loadFile(file){
  curFile=file;
  fname.textContent=file.name;
  fsize.textContent=(file.size/1024/1024).toFixed(1)+' MB';
  fp.style.display='flex';
  cw.style.display='block';
  results.style.display='none';
  results.innerHTML='<div class="section-label" style="margin-top:1.5rem;margin-bottom:0.75rem">Stems ready</div>';
  if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  const ab=await file.arrayBuffer();
  audioBuf=await audioCtx.decodeAudioData(ab);
  procBtn.disabled=false;
}

function resetAll(){
  audioBuf=null;curFile=null;stemBufs={};
  fp.style.display='none';cw.style.display='none';
  results.style.display='none';
  results.innerHTML='<div class="section-label" style="margin-top:1.5rem;margin-bottom:0.75rem">Stems ready</div>';
  fi.value='';procBtn.disabled=true;
}

document.querySelectorAll('.stem-btn').forEach(b=>{
  b.addEventListener('click',()=>b.classList.toggle('on'));
});

procBtn.addEventListener('click',async()=>{
  if(!audioBuf)return;
  const active=[...document.querySelectorAll('.stem-btn.on')].map(b=>b.dataset.stem);
  if(!active.length)return;
  procBtn.disabled=true;
  pw.style.display='block';
  stemBufs={};
  for(let i=0;i<active.length;i++){
    const s=active[i];
    pf.style.width=Math.round(i/active.length*100)+'%';
    pl.textContent='Processing '+stemNames[s]+'…';
    await new Promise(r=>setTimeout(r,60));
    stemBufs[s]=await extractStem(s,audioBuf);
    pf.style.width=Math.round((i+1)/active.length*100)+'%';
    await new Promise(r=>setTimeout(r,40));
  }
  pl.textContent='Done';
  setTimeout(()=>{pw.style.display='none';renderResults(active);procBtn.disabled=false},300);
});

async function extractStem(stem,src){
  const ctx=audioCtx,nCh=src.numberOfChannels,len=src.length,sr=src.sampleRate;
  const out=ctx.createBuffer(2,len,sr);
  const L=src.getChannelData(0),R=nCh>1?src.getChannelData(1):src.getChannelData(0);
  const oL=out.getChannelData(0),oR=out.getChannelData(1);
  if(stem==='instrumental'){for(let i=0;i<len;i++){const m=(L[i]+R[i])*.5,s=(L[i]-R[i])*.5;oL[i]=m+s*1.2;oR[i]=m-s*1.2}}
  else if(stem==='vocals'){for(let i=0;i<len;i++){const v=(L[i]-R[i])*.5;oL[i]=v;oR[i]=-v}}
  else if(stem==='bass'){const f=bqLP(sr,180,.7);for(let i=0;i<len;i++){const v=bqF(f,(L[i]+R[i])*.5);oL[i]=v;oR[i]=v}}
  else if(stem==='drums'){const fh=bqHP(sr,5000,.7),fe=bqLP(sr,80,.7);for(let i=0;i<len;i++){const hi=bqF(fh,(L[i]+R[i])*.5);const d=bqF(fe,Math.abs(hi))*8;oL[i]=d;oR[i]=d}}
  return out;
}

function bqLP(sr,freq,q){const w=2*Math.PI*freq/sr,a=Math.sin(w)/(2*q),c=Math.cos(w);return{b0:(1-c)/2,b1:1-c,b2:(1-c)/2,a0:1+a,a1:-2*c,a2:1-a,x1:0,x2:0,y1:0,y2:0}}
function bqHP(sr,freq,q){const w=2*Math.PI*freq/sr,a=Math.sin(w)/(2*q),c=Math.cos(w);return{b0:(1+c)/2,b1:-(1+c),b2:(1+c)/2,a0:1+a,a1:-2*c,a2:1-a,x1:0,x2:0,y1:0,y2:0}}
function bqF(f,x){const y=(f.b0/f.a0)*x+(f.b1/f.a0)*f.x1+(f.b2/f.a0)*f.x2-(f.a1/f.a0)*f.y1-(f.a2/f.a0)*f.y2;f.x2=f.x1;f.x1=x;f.y2=f.y1;f.y1=y;return y}

function drawWave(canvas,buf,color){
  const ctx=canvas.getContext('2d');
  const W=canvas.width=canvas.offsetWidth*devicePixelRatio,H=canvas.height=52*devicePixelRatio;
  ctx.clearRect(0,0,W,H);
  const data=buf.getChannelData(0),step=Math.ceil(data.length/W);
  for(let x=0;x<W;x++){
    let mn=1,mx=-1;
    for(let j=0;j<step;j++){const s=data[x*step+j]||0;if(s<mn)mn=s;if(s>mx)mx=s}
    const y1=(1-mx)*H/2,y2=(1-mn)*H/2;
    ctx.fillStyle=color+'40';
    ctx.fillRect(x,y1,1,Math.max(1,y2-y1));
    ctx.fillStyle=color+'99';
    const mid=(1-(data[Math.floor(x*data.length/W)]||0))*H/2;
    ctx.fillRect(x,mid,1,1);
  }
}

function renderResults(stems){
  results.innerHTML='<div class="section-label" style="margin-top:1.5rem;margin-bottom:0.75rem">Stems ready</div>';
  stems.forEach(stem=>{
    const buf=stemBufs[stem];if(!buf)return;
    const card=document.createElement('div');
    card.className='result-card';
    card.innerHTML=`
      <div class="rcard-top">
        <div class="rcard-title">
          <span class="stem-dot" style="background:${stemColors[stem]}"></span>
          ${stemNames[stem]}
        </div>
        <span class="rbadge">${buf.duration.toFixed(1)}s</span>
      </div>
      <canvas class="wave-canvas" id="wv-${stem}"></canvas>
      <div class="rcard-controls">
        <button class="play-btn" id="pb-${stem}">
          <svg width="11" height="11" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        </button>
        <span class="time-disp" id="td-${stem}">0:00</span>
        <input type="range" class="vol-slider" min="0" max="1" step="0.01" value="1" id="vs-${stem}" style="flex:1"/>
        <button class="dl-btn" id="dl-${stem}">Download</button>
      </div>`;
    results.appendChild(card);
    setTimeout(()=>{const c=document.getElementById('wv-'+stem);if(c)drawWave(c,buf,stemColors[stem])},60);
    document.getElementById('pb-'+stem).addEventListener('click',()=>togglePlay(stem));
    document.getElementById('vs-'+stem).addEventListener('input',e=>{if(stemSrcs[stem])stemSrcs[stem].gain.gain.value=parseFloat(e.target.value)});
    document.getElementById('dl-'+stem).addEventListener('click',()=>dlStem(stem));
  });
  results.style.display='block';
}

function togglePlay(stem){
  const btn=document.getElementById('pb-'+stem);
  if(stemPlaying[stem]){stemSrcs[stem].src.stop();stemPlaying[stem]=false;btn.innerHTML='<svg width="11" height="11" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>';return}
  if(audioCtx.state==='suspended')audioCtx.resume();
  const gain=audioCtx.createGain();
  gain.gain.value=parseFloat(document.getElementById('vs-'+stem).value);
  gain.connect(audioCtx.destination);
  const src=audioCtx.createBufferSource();
  src.buffer=stemBufs[stem];src.connect(gain);
  stemSrcs[stem]={src,gain};stemPlaying[stem]=true;
  const t0=audioCtx.currentTime,dur=stemBufs[stem].duration;
  const td=document.getElementById('td-'+stem);
  function tick(){if(!stemPlaying[stem])return;const e=audioCtx.currentTime-t0;const m=Math.floor(e/60),s=Math.floor(e%60).toString().padStart(2,'0');td.textContent=m+':'+s;if(e<dur)requestAnimationFrame(tick)}
  tick();src.start(0);
  btn.innerHTML='<svg width="11" height="11" viewBox="0 0 24 24" fill="#5DCAA5"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>';
  src.onended=()=>{stemPlaying[stem]=false;btn.innerHTML='<svg width="11" height="11" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>';td.textContent='0:00'};
}

async function dlStem(stem){
  const buf=stemBufs[stem];
  const oc=new OfflineAudioContext(buf.numberOfChannels,buf.length,buf.sampleRate);
  const s=oc.createBufferSource();s.buffer=buf;s.connect(oc.destination);s.start(0);
  const r=await oc.startRendering();
  const wav=toWav(r);
  const blob=new Blob([wav],{type:'audio/wav'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;
  a.download=(curFile?curFile.name.replace(/\.[^.]+$/,''):'track')+'_'+stem+'.wav';
  a.click();URL.revokeObjectURL(url);
}

function toWav(buf){
  const nCh=buf.numberOfChannels,len=buf.length,sr=buf.sampleRate;
  const ab=new ArrayBuffer(44+len*nCh*2),v=new DataView(ab);
  const w=(o,s)=>{for(let i=0;i<s.length;i++)v.setUint8(o+i,s.charCodeAt(i))};
  w(0,'RIFF');v.setUint32(4,36+len*nCh*2,true);w(8,'WAVE');w(12,'fmt ');
  v.setUint32(16,16,true);v.setUint16(20,1,true);v.setUint16(22,nCh,true);
  v.setUint32(24,sr,true);v.setUint32(28,sr*nCh*2,true);v.setUint16(32,nCh*2,true);
  v.setUint16(34,16,true);w(36,'data');v.setUint32(40,len*nCh*2,true);
  let off=44;
  for(let i=0;i<len;i++)for(let c=0;c<nCh;c++){const s=Math.max(-1,Math.min(1,buf.getChannelData(c)[i]));v.setInt16(off,s<0?s*0x8000:s*0x7FFF,true);off+=2}
  return ab;
}
